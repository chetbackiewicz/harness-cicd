template:
  name: Go Build and Test
  identifier: Go_Build_and_Test
  versionLabel: v1
  type: StepGroup
  projectIdentifier: DevSecOps
  orgIdentifier: default
  tags: {}
  spec:
    stageType: CI
    steps:
      - step:
          type: Run
          name: Go Build
          identifier: go_build
          spec:
            connectorRef: Dockerhub
            image: golang:1.22
            shell: Sh
            command: |-
              go version
              go build ./...
      - step:
          type: Run
          name: Go Test
          identifier: go_test
          spec:
            connectorRef: Dockerhub
            image: golang:1.22
            shell: Sh
            command: |-
              go test ./... -v -count=1 | tee test-output.txt
            reports:
              type: JUnit
              spec:
                paths:
                  - test-output.txt
