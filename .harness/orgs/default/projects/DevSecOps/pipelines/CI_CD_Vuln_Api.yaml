pipeline:
  name: CI CD Vuln Api
  identifier: CI_CD_Vuln_Api
  projectIdentifier: DevSecOps
  orgIdentifier: default
  tags: {}
  variables:
    - name: image_tag
      type: String
      description: Docker image tag of chetback/vuln_api to deploy (defaults to this run's sequenceId)
      required: true
      value: <+input>.default(<+pipeline.sequenceId>)
  properties:
    ci:
      codebase:
        connectorRef: harnesscicd
        repoName: harness-cicd
        build: <+input>
  stages:
    - stage:
        name: Build and Test
        identifier: BuildAndTest
        description: Compile and test the vuln-notes-api Go service
        type: CI
        timeout: 30m
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
            paths:
              - /root/.cache/go-build
              - /go/pkg/mod
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: aksclusterdelegate
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - stepGroup:
                  name: Go Build and Test
                  identifier: Go_Build_and_Test
                  template:
                    templateRef: Build_and_Test
                    versionLabel: v1
    - stage:
        name: Security Tests
        identifier: SecurityTests
        description: SAST, SCA, secrets, and CodeQL scans — warn-only, does not block deploy
        type: CI
        timeout: 30m
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: aksclusterdelegate
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              os: Linux
          execution:
            steps:
              - parallel:
                  - step:
                      type: Run
                      name: Semgrep SAST
                      identifier: semgrep_sast
                      template:
                        templateRef: Semgrep_Scan
                        versionLabel: v1
              - step:
                  type: Semgrep
                  name: Semgrep_2
                  identifier: Semgrep_2
                  spec:
                    target:
                      detection: auto
                      type: repository
                    advanced:
                      log:
                        level: info
                      args: {}
                    mode: orchestration
                    config: default
              - parallel:
                  - step:
                      type: Owasp
                      name: Owasp_1
                      identifier: Owasp_1
                      spec:
                        target:
                          detection: auto
                          type: repository
                        advanced:
                          log:
                            level: info
                          args: {}
                        mode: orchestration
                        config: default
                  - step:
                      type: OsvScanner
                      name: OsvScanner_1
                      identifier: OsvScanner_1
                      spec:
                        target:
                          detection: auto
                          type: repository
                        advanced:
                          log:
                            level: info
                          args: {}
                        mode: orchestration
                        config: default
              - step:
                  type: Gitleaks
                  name: Gitleaks_1
                  identifier: Gitleaks_1
                  spec:
                    target:
                      detection: auto
                      type: repository
                    advanced:
                      log:
                        level: info
                      args: {}
                    mode: orchestration
                    config: default
              # - step:
              #     type: GitHubAdvancedSecurity
              #     name: GitHubAdvancedSecurity_1
              #     identifier: GitHubAdvancedSecurity_1
              #     spec:
              #       mode: orchestration
              #       config: codeql
              #       target:
              #         type: repository
              #         detection: auto
              #       advanced:
              #         log:
              #           level: info
              #       privileged: true
              #       auth:
              #         access_token: <+secrets.getValue("GitHub_PAT_for_Security_Scan")>
    - stage:
        name: Push Image
        identifier: PushImage
        description: Build and push the vuln-api container image to Dockerhub
        type: CI
        timeout: 30m
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: aksclusterdelegate
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              os: Linux
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: build_and_push
                  spec:
                    connectorRef: Dockerhub
                    repo: chetback/vuln_api
                    tags:
                      - <+pipeline.sequenceId>
                    dockerfile: Dockerfile
                    context: .
                    caching: true
              - step:
                  type: Run
                  name: Update GitOps Manifest
                  identifier: update_gitops_manifest
                  description: Bump image tag in manifests/dev/values.yaml and commit so Argo (GitOps) syncs it
                  spec:
                    connectorRef: Dockerhub
                    image: alpine/git:latest
                    shell: Sh
                    command: |-
                      set -euo pipefail
                      TAG="<+pipeline.sequenceId>"
                      sed -i "s|^  tag: .*|  tag: \"${TAG}\"|" manifests/dev/values.yaml
                      echo "values.yaml now:" && cat manifests/dev/values.yaml
                      git config user.email "harness-ci@users.noreply.github.com"
                      git config user.name "Harness CI"
                      git add manifests/dev/values.yaml
                      if git diff --cached --quiet; then
                        echo "No image tag change to commit"
                        exit 0
                      fi
                      git commit -m "ci: bump vuln-api image tag to ${TAG} [skip ci]"
                      git push "https://<+secrets.getValue("GitHub_Repository_Updater")>@github.com/chetbackiewicz/harness-cicd.git" HEAD:main
