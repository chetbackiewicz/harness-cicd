pipeline:
  name: CI CD Vuln Api
  identifier: CI_CD_Vuln_Api
  projectIdentifier: DevSecOps
  orgIdentifier: default
  tags: {}
  variables:
    - name: image_tag
      type: String
      description: Docker image tag of chetback/vuln_api to deploy (defaults to this run's sequenceId)
      required: true
      value: <+input>.default(<+pipeline.sequenceId>)
  properties:
    ci:
      codebase:
        connectorRef: harnesscicd
        repoName: harness-cicd
        build: <+input>
  stages:
    - stage:
        name: Build and Test
        identifier: BuildAndTest
        description: Compile and test the vuln-notes-api Go service
        type: CI
        timeout: 30m
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
            paths:
              - /root/.cache/go-build
              - /go/pkg/mod
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: aksclusterdelegate
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - stepGroup:
                  name: Go Build and Test
                  identifier: Go_Build_and_Test
                  template:
                    templateRef: Build_and_Test
                    versionLabel: v1
    - stage:
        name: Security Tests
        identifier: SecurityTests
        description: SAST (Semgrep) — warn-only, does not block deploy
        type: CI
        timeout: 30m
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: aksclusterdelegate
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              os: Linux
          execution:
            steps:
              - parallel:
                  - step:
                      type: Run
                      name: Semgrep SAST
                      identifier: semgrep_sast
                      template:
                        templateRef: Semgrep_Scan
                        versionLabel: v1
    - stage:
        name: Push Image
        identifier: PushImage
        description: Build and push the vuln-api container image to Dockerhub
        type: CI
        timeout: 30m
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: aksclusterdelegate
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              os: Linux
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: build_and_push
                  spec:
                    connectorRef: Dockerhub
                    repo: chetback/vuln_api
                    tags:
                      - <+pipeline.sequenceId>
                    dockerfile: Dockerfile
                    context: .
                    caching: true
    - stage:
        name: Deploy
        identifier: Deploy
        description: Canary deploy vuln_api to the Development AKS environment
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: Vuln_Api_Service
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      sources:
                        - identifier: dockerhub_vuln_api
                          type: DockerRegistry
                          spec:
                            tag: <+pipeline.variables.image_tag>
          environment:
            environmentRef: Development
            deployToAll: false
            infrastructureDefinitions:
              - identifier: deploy_k8s_infra
          execution:
            steps:
              - stepGroup:
                  name: Canary Deployment
                  identifier: canaryDeployment
                  steps:
                    - step:
                        name: Canary Deployment
                        identifier: canaryDeployment
                        type: K8sCanaryDeploy
                        timeout: 10m
                        spec:
                          instanceSelection:
                            type: Count
                            spec:
                              count: 1
                          skipDryRun: false
                    - step:
                        name: Canary Delete
                        identifier: canaryDelete
                        type: K8sCanaryDelete
                        timeout: 10m
                        spec: {}
              - stepGroup:
                  name: Primary Deployment
                  identifier: primaryDeployment
                  steps:
                    - step:
                        name: Rolling Deployment
                        identifier: rollingDeployment
                        type: K8sRollingDeploy
                        timeout: 10m
                        spec:
                          skipDryRun: false
            rollbackSteps:
              - step:
                  name: Canary Delete
                  identifier: rollbackCanaryDelete
                  type: K8sCanaryDelete
                  timeout: 10m
                  spec: {}
              - step:
                  name: Rolling Rollback
                  identifier: rollingRollback
                  type: K8sRollingRollback
                  timeout: 10m
                  spec: {}
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
