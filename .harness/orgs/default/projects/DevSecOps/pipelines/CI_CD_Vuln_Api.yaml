pipeline:
  name: CI CD Vuln Api
  identifier: CI_CD_Vuln_Api
  projectIdentifier: DevSecOps
  orgIdentifier: default
  tags: {}
  variables:
    - name: image_tag
      type: String
      description: Docker image tag of chetback/vuln_api to deploy (defaults to this run's sequenceId)
      required: true
      value: <+input>.default(<+pipeline.sequenceId>)
  properties:
    ci:
      codebase:
        connectorRef: harnesscicd
        repoName: harness-cicd
        build: <+input>
  stages:
    - stage:
        name: Build and Test
        identifier: BuildAndTest
        description: Compile and test the vuln-notes-api Go service
        type: CI
        timeout: 30m
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
            paths:
              - /root/.cache/go-build
              - /go/pkg/mod
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: aksclusterdelegate
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - stepGroup:
                  name: Go Build and Test
                  identifier: Go_Build_and_Test
                  template:
                    templateRef: Build_and_Test
                    versionLabel: v1
    - stage:
        name: Security_Scan
        identifier: Security_Scan
        description: ""
        type: SecurityTests
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          infrastructure:
            useFromStage: BuildAndTest
          execution:
            steps:
              - step:
                  type: Semgrep
                  name: Semgrep_Scam
                  identifier: Semgrep_Scam
                  spec:
                    mode: orchestration
                    config: default
                    target:
                      type: repository
                      detection: auto
                    advanced:
                      log:
                        level: info
                  enforce:
                    policySets:
                      - policy_set_security_tests_severity_found_in_app_layer_06_22_14_56
              - step:
                  type: Owasp
                  name: Owasp_1
                  identifier: Owasp_1
                  spec:
                    mode: orchestration
                    config: default
                    target:
                      type: repository
                      detection: auto
                    advanced:
                      log:
                        level: info
                  enforce:
                    policySets:
                      - policy_set_security_tests_severity_found_in_app_layer_06_22_14_56
              - step:
                  type: Gitleaks
                  name: Gitleaks_1
                  identifier: Gitleaks_1
                  spec:
                    mode: orchestration
                    config: default
                    target:
                      type: repository
                      detection: auto
                    advanced:
                      log:
                        level: info
                  enforce:
                    policySets:
                      - policy_set_security_tests_severity_found_in_app_layer_06_22_14_56
    - stage:
        name: Push Image
        identifier: PushImage
        description: Build and push the vuln-api container image to Dockerhub
        type: CI
        timeout: 30m
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: aksclusterdelegate
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              os: Linux
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: build_and_push
                  spec:
                    connectorRef: Dockerhub
                    repo: chetback/vuln_api
                    tags:
                      - <+pipeline.sequenceId>
                    dockerfile: Dockerfile
                    context: .
                    caching: true
              - step:
                  type: Run
                  name: Update GitOps Manifest
                  identifier: update_gitops_manifest
                  description: Bump image tag in manifests/dev/values.yaml and commit so Argo (GitOps) syncs it
                  spec:
                    connectorRef: Dockerhub
                    image: alpine/git:latest
                    shell: Sh
                    command: |-
                      set -euo pipefail
                      TAG="<+pipeline.sequenceId>"
                      REMOTE="https://<+secrets.getValue("GitHub_Repository_Updater")>@github.com/chetbackiewicz/harness-cicd.git"
                      git config user.email "harness-ci@users.noreply.github.com"
                      git config user.name "Harness CI"
                      n=0
                      until [ "$n" -ge 5 ]; do
                        git fetch "$REMOTE" main
                        git checkout -B main FETCH_HEAD
                        sed -i "s|^  tag: .*|  tag: \"${TAG}\"|" manifests/dev/values.yaml
                        if git diff --quiet -- manifests/dev/values.yaml; then
                          echo "Image tag already ${TAG} on main; nothing to push"
                          exit 0
                        fi
                        echo "values.yaml now:" && cat manifests/dev/values.yaml
                        git add manifests/dev/values.yaml
                        git commit -m "ci: bump vuln-api image tag to ${TAG} [skip ci]"
                        if git push "$REMOTE" HEAD:main; then
                          echo "Pushed image tag ${TAG} to main"
                          exit 0
                        fi
                        n=$((n+1))
                        echo "Push rejected (likely concurrent update); retry ${n}/5 after re-fetch..."
                        sleep 3
                      done
                      echo "ERROR: failed to push manifest update after 5 attempts" >&2
                      exit 1
