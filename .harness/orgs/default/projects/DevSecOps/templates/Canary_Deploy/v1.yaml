template:
  name: Canary Deploy
  identifier: Canary_Deploy
  versionLabel: v1
  type: Stage
  projectIdentifier: DevSecOps
  orgIdentifier: default
  tags: {}
  spec:
    type: Deployment
    spec:
      deploymentType: Kubernetes
      environment:
        environmentRef: Development
        deployToAll: false
        infrastructureDefinitions:
          - identifier: deploy_k8s_infra
      service:
        serviceRef: Vuln_Api_Service
        serviceInputs:
          serviceDefinition:
            type: Kubernetes
            spec:
              artifacts:
                primary:
                  sources:
                    - identifier: dockerhub_vuln_api
                      type: DockerRegistry
                      spec:
                        tag: <+pipeline.variables.image_tag>
        failureStrategies:
          - onFailure:
              errors:
                - Unknown
                - Authentication
                - Connectivity
                - Timeout
                - Authorization
                - Verification
                - DelegateProvisioning
                - InputTimeoutError
                - PolicyEvaluationFailure
                - ApprovalRejection
                - DelegateRestart
                - UserMarkedFailure
              action:
                type: Abort
      execution:
        steps:
          - stepGroup:
              name: Canary Deployment
              identifier: canaryDeployment
              steps:
                - step:
                    name: Canary Deployment
                    identifier: canaryDeployment
                    type: K8sCanaryDeploy
                    timeout: 10m
                    spec:
                      instanceSelection:
                        type: Count
                        spec:
                          count: 1
                      skipDryRun: false
                - step:
                    name: Canary Delete
                    identifier: canaryDelete
                    type: K8sCanaryDelete
                    timeout: 10m
                    spec: {}
          - stepGroup:
              name: Primary Deployment
              identifier: primaryDeployment
              steps:
                - step:
                    name: Rolling Deployment
                    identifier: rollingDeployment
                    type: K8sRollingDeploy
                    timeout: 10m
                    spec:
                      skipDryRun: false
        rollbackSteps:
          - step:
              name: Canary Delete
              identifier: rollbackCanaryDelete
              type: K8sCanaryDelete
              timeout: 10m
              spec: {}
          - step:
              name: Rolling Rollback
              identifier: rollingRollback
              type: K8sRollingRollback
              timeout: 10m
              spec: {}
    failureStrategies:
      - onFailure:
          errors:
            - AllErrors
          action:
            type: StageRollback
