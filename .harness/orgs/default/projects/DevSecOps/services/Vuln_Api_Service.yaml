service:
  name: Vuln Api Service
  identifier: Vuln_Api_Service
  orgIdentifier: default
  projectIdentifier: DevSecOps
  gitOpsEnabled: false
  serviceDefinition:
    type: Kubernetes
    spec:
      manifests:
        - manifest:
            identifier: vuln_api_manifests
            type: K8sManifest
            spec:
              store:
                type: Github
                spec:
                  connectorRef: harnesscicd
                  gitFetchType: Branch
                  paths:
                    - manifests/dev/10-deployment.yaml
                    - manifests/dev/20-service.yaml
                  repoName: harness-cicd
                  branch: main
              valuesPaths:
                - manifests/dev/values.yaml
              skipResourceVersioning: false
              enableDeclarativeRollback: false
      artifacts:
        primary:
          primaryArtifactRef: dockerhub_vuln_api
          sources:
            - identifier: dockerhub_vuln_api
              type: DockerRegistry
              spec:
                connectorRef: Dockerhub
                imagePath: chetback/vuln_api
                tag: <+input>
