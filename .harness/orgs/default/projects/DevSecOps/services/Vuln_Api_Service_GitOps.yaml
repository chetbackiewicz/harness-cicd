service:
  name: Vuln_Api_Service_GitOps
  identifier: Vuln_Api_Service_GitOps
  description: ""
  tags: {}
  serviceDefinition:
    type: Kubernetes
    spec:
      manifests:
        - manifest:
            identifier: releaseRepo
            type: ReleaseRepo
            spec:
              store:
                type: Github
                spec:
                  connectorRef: harnesscicd
                  gitFetchType: Branch
                  paths:
                    - manifests/dev/values.yaml
                  repoName: harness-cicd
                  branch: main
        - manifest:
            identifier: vuln_api_manifests
            type: K8sManifest
            spec:
              store:
                type: Github
                spec:
                  connectorRef: harnesscicd
                  gitFetchType: Branch
                  paths:
                    - manifests/dev/templates/10-deployment.yaml
                    - manifests/dev/templates/20-service.yaml
                  repoName: harness-cicd
                  branch: main
              valuesPaths:
                - manifests/dev/values.yaml
              skipResourceVersioning: false
              enableDeclarativeRollback: false
      artifacts:
        primary:
          primaryArtifactRef: dockerhub_vuln_api
          sources:
            - identifier: dockerhub_vuln_api
              type: DockerRegistry
              spec:
                connectorRef: Dockerhub
                imagePath: chetback/vuln_api
                tag: <+pipeline.variables.image_tag>
  gitOpsEnabled: true
  orgIdentifier: default
  projectIdentifier: DevSecOps
