trigger:
  name: On Push to Main
  identifier: On_Push_to_Main
  enabled: true
  description: Runs CI/CD on pushes to main, excluding the CI's own GitOps manifest bump to avoid self-trigger loops
  orgIdentifier: default
  projectIdentifier: DevSecOps
  pipelineIdentifier: CI_CD_Vuln_Api
  source:
    type: Webhook
    spec:
      type: Github
      spec:
        type: Push
        spec:
          connectorRef: harnesscicd
          autoAbortPreviousExecutions: false
          payloadConditions:
            - key: targetBranch
              operator: Equals
              value: main
            # Path-exclusion: skip runs whose changed files are the GitOps
            # manifest bump committed by the "Update GitOps Manifest" step.
            # No "DoesNotContain" operator exists, so use Regex negative-lookahead
            # (per Harness docs: e.g. ^((?!README\.md).)*$).
            - key: changedFiles
              operator: Regex
              value: '^((?!manifests/dev/values\.yaml).)*$'
          headerConditions: []
          # Belt-and-suspenders: also skip commits carrying [skip ci]
          # (the CI bump commit message includes this marker).
          jexlCondition: <+eventPayload.head_commit.message> == null || !(<+eventPayload.head_commit.message> =~ ".*\\[skip ci\\].*")
          actions: []
  # The pipeline is stored in Git (Git Experience / remote). Triggers for a
  # remote pipeline must declare which branch to read the pipeline + input set
  # from, and supply runtime inputs via an Input Set stored in the same repo
  # (inline inputYaml is not used for remote pipelines).
  pipelineBranchName: <+trigger.branch>
  inputSetRefs:
    - On_Push_Trigger_Inputs
